<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>국가정보원 메인 비주얼</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <section class="hero">
      <div class="hero-inner">
        <h1 class="hero-title">
          안전하고 평화로운 대한민국을 위해<br />
          국가정보원이 함께합니다.
        </h1>

        <ul class="card-list">
          <li class="card-item">
            <a href="#">
              <div class="card-image-box">
                <img src="./images/img_about_1.jpg" alt="직무" />
              </div>
              <div class="card-title">직무</div>
            </a>
          </li>

          <li class="card-item">
            <a href="#">
              <div class="card-image-box">
                <img src="./images/img_about_2.png" alt="국정원 역사" />
              </div>
              <div class="card-title">국정원 역사</div>
            </a>
          </li>

          <li class="card-item">
            <a href="#">
              <div class="card-image-box">
                <img src="./images/img_about_3.jpg" alt="관련 법령" />
              </div>
              <div class="card-title">관련 법령</div>
            </a>
          </li>
        </ul>
      </div>
    </section>
  </body>
</html>
