<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>전세계 날씨</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div class="header-top">
          <div class="title-wrap">
            <h1>전세계 날씨</h1>
            <p>현재 위치 + 도시 검색으로 전세계 날씨 조회</p>
          </div>

          <button type="button" id="locationBtn" class="location-btn">
            내 위치
          </button>
        </div>

        <form id="searchForm" class="search-form">
          <label for="cityInput" class="search-input-wrap">
            <svg
              class="search-icon"
              viewBox="0 0 24 24"
              fill="none"
              aria-hidden="true"
            >
              <circle
                cx="11"
                cy="11"
                r="7"
                stroke="currentColor"
                stroke-width="2"
              ></circle>
              <path
                d="M20 20L16.65 16.65"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              ></path>
            </svg>

            <input
              type="text"
              id="cityInput"
              placeholder="도시명을 입력하세요. (예: Seoul, Tokyo)"
              autocomplete="off"
            />
          </label>

          <button type="submit" id="searchBtn" class="search-btn">검색</button>
        </form>
      </header>

      <section class="weather-section">
        <div class="weather-headline">
          <h2 id="cityName">도시명</h2>

          <div class="temperature-box" aria-label="현재 기온">
            <strong id="tempValue">15</strong>
            <span>°</span>
          </div>
        </div>

        <p id="statusText" class="status-text">
          날씨 정보를 불러오는 중입니다.
        </p>

        <div class="weather-grid">
          <article class="weather-card">
            <span class="label">풍속</span>
            <strong id="windSpeed">6.69 m/s</strong>
          </article>

          <article class="weather-card">
            <span class="label">습도</span>
            <strong id="humidity">100 %</strong>
          </article>

          <article class="weather-card">
            <span class="label">체감기온</span>
            <strong id="feelsLike">15 °C</strong>
          </article>

          <article class="weather-card">
            <span class="label">오존(O₃)</span>
            <strong id="ozone">111 μg/m³</strong>
          </article>
        </div>
      </section>
    </main>

    <script src="./script/script.js"></script>
  </body>
</html>
