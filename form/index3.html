<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form 태그응용</title>
    <link rel="stylesheet" href="./css/style3.css" />
  </head>
  <body>
    <form action="" name="info" method="post">
      <fieldset>
        <legend>개인정보</legend>
        <ol>
          <li>
            <label class="name" for="name">이름</label>
            <input id="name" type="text" name="name" />
          </li>
          <li>
            <label for="mail">메일주소</label>
            <input id="mail" type="text" name="mail" />
          </li>
        </ol>
      </fieldset>
      <fieldset>
        <legend>로그인 정보</legend>
        <ol>
          <li>
            <label class="id" for="id">아이디</label>
            <input id="id" type="text" name="id" />
          </li>
          <li>
            <label for="pw">비밀번호</label>
            <input id="pw" type="password" name="password" />
          </li>
        </ol>
      </fieldset>
      <h1>회원가입</h1>
      <fieldset>
        <legend>필수정보</legend>
        <label for="joinname">이름:</label>
        <input type="text" id="joinname" name="joinname" />
      </fieldset>
      <fieldset>
        <legend>선택정보</legend>
        <label for="birthday">생일:</label>
        <input type="date" name="birthday" id="birthday" />
      </fieldset>
      <fieldset class="check">
        <legend>신청과목</legend>
        <p>이 달에 신청할 과목을 선택하세요 (1과목만 가능)</p>
        <input type="radio" name="subjects" id="speak" />
        <label for="speak">회화</label>
        <input type="radio" name="subjects" id="grammar" />
        <label for="grammar">문법</label>
        <input type="radio" name="subjects" id="writ" />
        <label for="writ">작문</label>
      </fieldset>
      <fieldset class="check">
        <legend>메일링</legend>
        <p>메일로 받고 싶은 뉴스 주제를 선택해 주세요(복수선택가능)</p>
        <input type="checkbox" name="global" id="global" />
        <label for="global">해외단신</label>
        <input type="checkbox" name="conver" id="conver" />
        <label for="conver">5분 회화</label>
        <input type="checkbox" name="morning" id="morning" />
        <label for="morning">모닝팝스</label>
      </fieldset>
      <h1>학습단계선택</h1>
      <select name="level" id="level">
        <option value="easy">초급</option>
        <option value="basic">중급</option>
        <option value="pre">고급</option>
      </select>
      <fieldset class="last">
        <label for="car">자동차 브랜드 선택:</label>
        <select name="car" id="car" multiple>
          <option value="v">볼보</option>
          <option value="s">싸보</option>
          <option value="p">피아트</option>
          <option value="a">아우디</option>
        </select>
      </fieldset>
      <input type="submit" value="제출" />
    </form>
  </body>
</html>
