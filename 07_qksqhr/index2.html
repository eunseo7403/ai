<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>반복문2</title>
  </head>
  <body>
    <script>
      // 배열
      let girl = [
        "태연",
        "써니",
        "티파니",
        "효연",
        "유리",
        "수영",
        "윤아",
        "서현",
      ];

      document.write(girl[0] + "<br>");
      document.write(girl[1] + "<br>");
      document.write(girl[2] + "<br>");
      document.write(girl[3] + "<br>");
      document.write(girl[4] + "<br>");
      document.write(girl[5] + "<br>");
      document.write(girl[6] + "<br>");
      document.write(girl[7] + "<br>");
      document.write("<hr>");

      // 반복문을 사용하여 배열에 있는 값을 출력
      for (let i = 0; i < girl.length; i++) {
        document.write(girl[i] + "<br>");
      }

      document.write("<hr>");

      console.log(girl);
    </script>
  </body>
</html>
