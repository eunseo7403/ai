<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>반복문</title>
  </head>
  <body>
    <!-- 반복문(한번에 여러번 실행할때 사용) -->
    <script>
      //   document.write("안녕하세요", 1);
      //   document.write("<br>안녕하세요", 2);
      //   document.write("<br>안녕하세요", 3);
      //   document.write("<br>안녕하세요", 4);
      //   document.write("<br>안녕하세요", 5);
      //   document.write("<br>안녕하세요", 6);
      //   document.write("<br>안녕하세요", 7);
      //   document.write("<br>안녕하세요", 8);
      //   document.write("<br>안녕하세요", 9);
      //   document.write("<br>안녕하세요", 10);
      //   document.write("<br>안녕하세요", 11);
      //   document.write("<br>안녕하세요", 12);
      //   document.write("<br>안녕하세요", 13);
      //   document.write("<br>안녕하세요", 14);
      //   document.write("<br>안녕하세요", 15);

      // 1~50까지 안녕하세요 반복문
      // 시작, 종료, 증가 or 감소(++,+=n)
      for (let i = 2; i <= 10; i += 2) {
        document.write(`안녕하세요 ${i}<br>`);
      }
      document.write("<hr>");
      // 1~20까지 반대로 출력하는 프로그램
      for (let j = 20; j >= 1; j--) {
        document.write(`안녕하세요 ${j}<br>`);
      }
      document.write("<hr>");
      // 3단을 출력하는 구구단
      for (let k = 1; k <= 9; k++) {
        document.write(`3*${k}=${3 * k}<br>`);
      }
    </script>
  </body>
</html>
