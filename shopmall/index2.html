<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메인페이지 시안 구현</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #eeeeee;
        font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
      }

      header {
        width: 1200px;
        height: 150px;
        margin: 0 auto;
        background: #cccccc;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .search-box {
        width: 350px;
        height: 60px;
        background: #f0aaaa;
      }

      .logo-box {
        width: 350px;
        height: 70px;
        background: #993737;
      }

      .right-box {
        width: 350px;
        height: 90px;
        background: #f5f5f5;
      }

      .main-banner {
        width: 100%;
        height: 450px;
        background: #b2b2b2;
      }

      main {
        width: 1200px;
        min-height: 600px;
        margin: 0 auto;
      }

      .side-dish {
        height: 1000px;
        background: #efbe8f;
      }

      .regular-side-dish {
        height: 600px;
        background: #81d79a;
      }

      .new-side-dish {
        height: 1000px;
        background: #df8588;
      }

      .middle-banner {
        height: 200px;
        background: #8592de;
      }

      .md-pick {
        height: 1000px;
        background: #c769eb;
      }

      footer {
        width: 1200px;
        height: 200px;
        margin: 0 auto;
        background: #b2b2b2;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .footer-left-box {
        width: 385px;
        height: 125px;
        background: #f47f7f;
      }

      .footer-right-box {
        width: 775px;
        height: 125px;
        background: #f0e05a;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="search-box"></div>
      <div class="logo-box"></div>
      <div class="right-box"></div>
    </header>

    <div class="main-banner"></div>

    <main>
      <div class="side-dish"></div>
      <div class="regular-side-dish"></div>
      <div class="new-side-dish"></div>
      <div class="middle-banner"></div>
      <div class="md-pick"></div>
    </main>

    <footer>
      <div class="footer-left-box"></div>
      <div class="footer-right-box"></div>
    </footer>
  </body>
</html>
