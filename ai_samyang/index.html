<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Noto Sans KR 웹폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />

    <title>Community</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="community-header">
        <h1>COMMUNITY</h1>
        <p>
          삼양식품은 혁신적인 기술과 포용적인 사고로 여러분과 함께<br />
          새로운 식문화를 만들어갑니다.
        </p>

        <ul class="social-list">
          <li>
            <a href="#" aria-label="facebook">
              <img src="./images/ico_facebook.png" alt="페이스북 아이콘" />
            </a>
          </li>
          <li>
            <a href="#" aria-label="instagram">
              <img src="./images/ico_insta.png" alt="인스타그램 아이콘" />
            </a>
          </li>
          <li>
            <a href="#" aria-label="blog">
              <img src="./images/ico_blog.png" alt="블로그 아이콘" />
            </a>
          </li>
          <li>
            <a href="#" aria-label="twitter">
              <img src="./images/ico_twitter.png" alt="트위터 아이콘" />
            </a>
          </li>
        </ul>
      </div>

      <div class="community-grid">
        <div class="card visual-card">
          <!-- 여기에 이미지 넣을 경우 CSS에서 background-image 경로만 넣으면 됩니다 -->
          <div class="img-placeholder"></div>
        </div>

        <div class="card promo-card">
          <div class="card-inner">
            <h2>홍보영상</h2>
            <p>
              삼양식품의 다채로운 스토리를<br />
              영상으로 보여드립니다.
            </p>
            <button type="button" class="btn-more">자세히보기</button>
          </div>
        </div>

        <div class="card contact-card">
          <div class="card-inner">
            <h2>고객 문의</h2>
            <p>
              삼양식품에게<br />
              여러분의 다양한 의견을 남겨주세요.
            </p>
            <button type="button" class="btn-more">자세히보기</button>
          </div>
        </div>

        <div class="right-stack">
          <div class="card share-card">
            <div class="card-inner">
              <h2>맛있는 나눔</h2>
              <p>모두가 행복한 맛있는 세상</p>
              <button type="button" class="btn-more">자세히보기</button>
            </div>
          </div>

          <div class="card notice-card">
            <div class="card-inner">
              <h2>공지사항</h2>
              <p>삼양식품 개인정보취급방침 개정 안내</p>
              <button type="button" class="btn-more">자세히보기</button>
            </div>
          </div>

          <div class="card mall-card">
            <div class="card-inner">
              <h2>삼양식품 공식몰</h2>
              <p>
                삼양식품의<br />
                다양한 제품을 만나보세요.
              </p>
              <button type="button" class="btn-more">자세히보기</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
