<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>if 제 2형식</title>
  </head>
  <body>
    <script>
      // if(조건식) {
      //     조건식이 참일때 실행
      // }

      // else {
      //     조건식이 거짓일때 실행
      // }

      // 외부로부터 data를 받아서 80점 이상이면 "합격", 미만이면 "불합격"

      let jumsu = prompt("점수를 입력하세요. (0~100)");

      if (jumsu >= 80) {
        alert("합격");
      } else {
        alert("불합격");
      }
    </script>
  </body>
</html>
