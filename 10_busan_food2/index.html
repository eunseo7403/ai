<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>부산 맛집 서비스</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="app" id="app">
      <!-- 목록 화면 -->
      <section class="view view-list" id="listView">
        <header class="topbar">
          <div class="topbar-text">
            <h1>부산 맛집 서비스</h1>
            <p id="countText">전체(0건)</p>
          </div>

          <div class="topbar-actions">
            <button
              type="button"
              class="icon-btn"
              id="refreshBtn"
              aria-label="새로고침"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M20 12a8 8 0 1 1-2.34-5.66M20 4v6h-6"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>

            <button
              type="button"
              class="icon-btn"
              id="headerFavoriteBtn"
              aria-label="즐겨찾기 보기"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 20.5s-7-4.35-7-10a4.25 4.25 0 0 1 7-3.1 4.25 4.25 0 0 1 7 3.1c0 5.65-7 10-7 10Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
        </header>

        <div class="search-wrap">
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M21 21l-4.35-4.35M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <input
              type="search"
              id="searchInput"
              placeholder="가게명/주소/메뉴로 검색"
              autocomplete="off"
            />
          </div>
        </div>

        <div class="message" id="messageBox">
          맛집 정보를 불러오는 중입니다.
        </div>

        <div class="restaurant-list" id="restaurantList"></div>

        <div class="load-more-wrap hidden" id="loadMoreWrap">
          <button type="button" class="load-more-btn" id="loadMoreBtn">
            더보기
          </button>
        </div>

        <div class="empty-state hidden" id="emptyState">
          조건에 맞는 맛집이 없습니다.
        </div>

        <nav class="bottom-nav" aria-label="하단 메뉴">
          <button type="button" class="nav-btn active" id="tabAll">맛집</button>
          <button type="button" class="nav-btn" id="tabFavorites">
            즐겨찾기
          </button>
        </nav>
      </section>

      <!-- 상세 화면 -->
      <section class="view view-detail hidden" id="detailView">
        <button
          type="button"
          class="back-btn"
          id="backBtn"
          aria-label="뒤로가기"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M15 18l-6-6 6-6"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>

        <div class="detail-image-wrap">
          <img id="detailImage" alt="맛집 이미지" />
          <div class="detail-image-empty hidden" id="detailImageEmpty">
            이미지 없음
          </div>
        </div>

        <div class="detail-body">
          <div class="detail-section">
            <span class="section-badge">상호명</span>
            <p class="section-value title" id="detailTitle">-</p>
          </div>

          <div class="detail-section">
            <span class="section-badge">주소</span>
            <p class="section-value" id="detailAddress">-</p>
          </div>

          <div class="detail-section">
            <span class="section-badge">소개</span>
            <p class="section-value desc" id="detailDesc">-</p>
          </div>

          <div class="detail-section" id="menuSection">
            <span class="section-badge">대표메뉴</span>
            <p class="section-value" id="detailMenu">-</p>
          </div>

          <div class="detail-section" id="telSection">
            <span class="section-badge">연락처</span>
            <p class="section-value" id="detailTel">-</p>
          </div>

          <div class="detail-section" id="timeSection">
            <span class="section-badge">운영시간</span>
            <p class="section-value" id="detailTime">-</p>
          </div>

          <div class="detail-section hidden" id="homepageSection">
            <span class="section-badge">홈페이지</span>
            <p class="section-value">
              <a
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                id="detailHomepage"
                >바로가기</a
              >
            </p>
          </div>

          <div class="detail-map-wrap">
            <div class="detail-map" id="detailMap"></div>
            <div class="map-fallback hidden" id="mapFallback"></div>
          </div>
        </div>
        <div class="review-section">
          <span class="section-badge">리뷰</span>

          <form class="review-form" id="reviewForm">
            <input
              type="text"
              id="reviewNickname"
              placeholder="닉네임 (선택)"
              maxlength="20"
            />
            <textarea
              id="reviewContent"
              placeholder="리뷰를 작성해 주세요."
              maxlength="300"
            ></textarea>
            <button type="submit" class="review-submit-btn">리뷰 등록</button>
          </form>

          <p class="review-empty" id="reviewEmpty">
            아직 작성된 리뷰가 없습니다.
          </p>
          <div class="review-list" id="reviewList"></div>
        </div>
      </section>
    </div>

    <script src="./script/script.js"></script>
  </body>
</html>
