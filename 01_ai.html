<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>진달래 꽃</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background: #fffafc;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 36px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 3rem;
      text-align: center;
      color: #333;
    }

    h2 {
      margin: 0 0 36px;
      font-size: 1.4rem;
      font-weight: 500;
      text-align: right;
      color: #666;
    }

    p {
      margin: 0 0 28px;
      font-size: 1.25rem;
      line-height: 1.9;
      text-align: center;
      white-space: pre-line;
    }

    p:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>진달래 꽃</h1>
    <h2>지은이: 김소월</h2>

    <p>나 보기가
역겨워
가실 때에는</p>

    <p>말 없이
고이
보내 드리오리다</p>

    <p>영변에
약산
진달래 꽃</p>

    <p>진달래
진달래 꽃
피웠네</p>
  </main>
</body>
</html>
