<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>겨울의 계절</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
        text-align: center;
        background-color: #d3d3d3;
      }

      .container {
        width: 500px;
        margin: 0 auto;
        padding-top: 24px;
      }

      h1 {
        font-size: 30px;
        font-weight: bold;
        margin-bottom: 24px;
        color: #6a6aff;
      }

      .line {
        width: 500px;
        height: 6px;
        background-color: #3b3b3b;
        margin: 0 auto 18px;
      }

      .photo {
        width: 500px;
        height: 330px;
        display: block;
        object-fit: cover;
        margin: 0 auto 20px;
        cursor: pointer;
      }

      .back-link {
        display: inline-block;
        margin-top: 6px;
        font-size: 18px;
        color: #000;
        text-decoration: none;
      }

      .back-link:hover {
        text-decoration: underline;
      }

      a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>겨울의 계절</h1>

      <div class="line"></div>

      <a href="ai_main.html">
        <img src="images/winter.jpg" alt="겨울의 계절 이미지" class="photo" />
      </a>

      <div class="line"></div>

      <a href="ai_main.html" class="back-link">[메인화면으로 이동]</a>
    </div>
  </body>
</html>
