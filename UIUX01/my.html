<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AURA MY</title>

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/my.css" />
  </head>

  <body class="my-page">
    <div class="my-wrap">
      <!-- header -->
      <header class="my-header">
        <a href="./home.html" class="my-back-button">
          <img src="./images/icons/back.png" alt="뒤로가기" />
        </a>

        <h1>MY</h1>
      </header>

      <!-- main -->
      <main class="my-main">
        <!-- profile -->
        <section class="my-profile">
          <div class="profile-img">
            <img src="./images/my/profile.png" alt="프로필 이미지" />
          </div>

          <div class="profile-info">
            <div class="profile-name-row">
              <h2>싹난감자</h2>
              <button type="button" class="profile-edit-button">
                <img src="./images/my/pencil.png" alt="프로필 수정" />
              </button>
            </div>

            <p>옷 등록하고 편하게 코디해보세요.</p>
          </div>
        </section>

        <!-- location button -->
        <a href="./location.html" class="location-change-button">
          <img src="./images/my/location.png" alt="" />
          현재 위치 변경
        </a>

        <!-- stats -->
        <section class="my-stats">
          <div class="stat-item">
            <strong>총 게시물</strong>
            <span>5</span>
          </div>

          <div class="stat-item">
            <strong>스크랩 수</strong>
            <span>1</span>
          </div>

          <div class="stat-item">
            <strong>댓글 수</strong>
            <span>27</span>
          </div>
        </section>

        <!-- menu list -->
        <section class="my-menu-list">
          <a href="#" class="my-menu-item">
            <div class="menu-left">
              <img src="./images/my/note.png" alt="" />
              <span>공지사항</span>
            </div>

            <img src="./images/my/back.png" alt="" class="menu-arrow" />
          </a>

          <a href="#" class="my-menu-item">
            <div class="menu-left">
              <img src="./images/my/bell.png" alt="" />
              <span>알림설정</span>
            </div>

            <img src="./images/my/back.png" alt="" class="menu-arrow" />
          </a>

          <a href="#" class="my-menu-item">
            <div class="menu-left">
              <img src="./images/my/question.png" alt="" />
              <span>자주 묻는 질문</span>
            </div>

            <img src="./images/my/back.png" alt="" class="menu-arrow" />
          </a>

          <a href="#" class="my-menu-item">
            <div class="menu-left">
              <img src="./images/my/hand.png" alt="" />
              <span>서비스 안내</span>
            </div>

            <img src="./images/my/back.png" alt="" class="menu-arrow" />
          </a>

          <a href="#" class="my-menu-item">
            <div class="menu-left">
              <img src="./images/my/headset.png" alt="" />
              <span>고객센터</span>
            </div>

            <img src="./images/my/back.png" alt="" class="menu-arrow" />
          </a>
        </section>
      </main>

      <!-- common tab bar -->
      <nav class="app-tabbar">
        <a href="./home.html" class="tabbar-item">
          <img src="./images/tab/home.png" alt="" />
          <span>홈</span>
        </a>

        <a href="./closet.html" class="tabbar-item">
          <img src="./images/tab/closet.png" alt="" />
          <span>옷장</span>
        </a>

        <a href="./codi.html" class="tabbar-item">
          <img src="./images/tab/codi.png" alt="" />
          <span>코디</span>
        </a>

        <a href="./community.html" class="tabbar-item">
          <img src="./images/tab/community.png" alt="" />
          <span>커뮤니티</span>
        </a>

        <a href="./my.html" class="tabbar-item active">
          <img src="./images/tab/my-active.png" alt="" />
          <span>마이</span>
        </a>
      </nav>
    </div>
    <script src="./script/my.js"></script>
  </body>
</html>
