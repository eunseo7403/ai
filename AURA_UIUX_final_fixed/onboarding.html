<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AURA Onboarding</title>

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/common.css" />

    <!-- Swiper CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="./css/onboarding.css" />
  </head>

  <body class="onboarding-page">
    <main class="onboarding-screen">
      <div class="swiper onboarding-swiper">
        <div class="swiper-wrapper">
          <!-- slide 01 -->
          <section class="swiper-slide onboarding-slide">
            <div class="onboarding-inner">
              <div class="onboarding-visual visual-01">
                <img
                  src="./images/onboarding/img.png"
                  alt="옷 앞에서 고민하는 이미지"
                />
              </div>

              <div class="onboarding-text">
                <h1>옷 앞에서 고민한 경험이 있으신가요?</h1>
                <p>
                  옷장은 가득한데 막상 나가려고 하면 무엇을 입어야 할지<br />
                  한참을 고민하게 되는 순간이 있죠.
                </p>
              </div>
            </div>
          </section>

          <!-- slide 02 -->
          <section class="swiper-slide onboarding-slide">
            <div class="onboarding-inner">
              <div class="onboarding-visual visual-02">
                <img
                  src="./images/onboarding/img2.png"
                  alt="코디 고민을 상담하는 이미지"
                />
              </div>

              <div class="onboarding-text">
                <h1>코디 고민을 덜어보세요</h1>
                <p>
                  옷을 고르는 순간마다<br />
                  누군가 알려준다면 더 쉬워질 거예요.
                </p>
              </div>
            </div>
          </section>

          <!-- slide 03 -->
          <section class="swiper-slide onboarding-slide">
            <div class="onboarding-inner">
              <div class="onboarding-visual visual-03">
                <img
                  src="./images/onboarding/img3.png"
                  alt="가볍게 외출하는 이미지"
                />
              </div>

              <div class="onboarding-text">
                <h1>이제 가볍게 외출하세요</h1>
                <p>
                  오늘의 날씨와 상황에 맞는 코디로<br />
                  더 가볍고 자신 있게 하루를 시작해보세요.
                </p>
              </div>
            </div>
          </section>

          <!-- slide 04 -->
          <section class="swiper-slide onboarding-slide onboarding-style-slide">
            <div class="onboarding-style-inner">
              <div class="style-title">
                <h1>선호하는 스타일</h1>
                <span>(최대 5개)</span>
              </div>

              <div class="style-grid">
                <button type="button" class="style-card" aria-pressed="false" data-style="캐주얼">
                  <img src="./images/onboarding/icons/01.png" alt="캐주얼" />
                  <span>캐주얼</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="미니멀">
                  <img src="./images/onboarding/icons/02.png" alt="미니멀" />
                  <span>미니멀</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="스트릿">
                  <img src="./images/onboarding/icons/03.png" alt="스트릿" />
                  <span>스트릿</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="클래식">
                  <img src="./images/onboarding/icons/04.png" alt="클래식" />
                  <span>클래식</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="모던">
                  <img src="./images/onboarding/icons/05.png" alt="모던" />
                  <span>모던</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="페미닌">
                  <img src="./images/onboarding/icons/06.png" alt="페미닌" />
                  <span>페미닌</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="러블리">
                  <img src="./images/onboarding/icons/07.png" alt="러블리" />
                  <span>러블리</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="빈티지">
                  <img src="./images/onboarding/icons/08.png" alt="빈티지" />
                  <span>빈티지</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="프레피">
                  <img src="./images/onboarding/icons/09.png" alt="프레피" />
                  <span>프레피</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="스포티">
                  <img src="./images/onboarding/icons/10.png" alt="스포티" />
                  <span>스포티</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="애슬레저">
                  <img src="./images/onboarding/icons/11.png" alt="애슬레저" />
                  <span>애슬레저</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="오피스룩">
                  <img src="./images/onboarding/icons/12.png" alt="오피스룩" />
                  <span>오피스룩</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="Y2K">
                  <img src="./images/onboarding/icons/13.png" alt="Y2K" />
                  <span>Y2K</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="하이틴">
                  <img src="./images/onboarding/icons/14.png" alt="하이틴" />
                  <span>하이틴</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="아웃도어">
                  <img src="./images/onboarding/icons/15.png" alt="아웃도어" />
                  <span>아웃도어</span>
                </button>

                <button type="button" class="style-card" aria-pressed="false" data-style="럭셔리">
                  <img src="./images/onboarding/icons/16.png" alt="럭셔리" />
                  <span>럭셔리</span>
                </button>
              </div>
            </div>
          </section>
        </div>
      </div>

      <!-- 하단 점 버튼 -->
      <div class="onboarding-dots">
        <button
          type="button"
          class="onboarding-dot active"
          data-index="0"
          aria-label="1번 온보딩 화면으로 이동"
          aria-current="true"
        ></button>
        <button type="button" class="onboarding-dot" data-index="1" aria-label="2번 온보딩 화면으로 이동"></button>
        <button type="button" class="onboarding-dot" data-index="2" aria-label="3번 온보딩 화면으로 이동"></button>
        <button type="button" class="onboarding-dot" data-index="3" aria-label="4번 온보딩 화면으로 이동"></button>
      </div>

      <!-- 하단 버튼 -->
      <div class="onboarding-bottom">
        <button type="button" class="onboarding-next">다음</button>
        <button type="button" class="onboarding-skip">건너뛰기</button>
      </div>
    </main>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script src="./script/common.js"></script>
    <script src="./script/onboarding.js"></script>
  </body>
</html>
