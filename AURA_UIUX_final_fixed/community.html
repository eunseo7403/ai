<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AURA Community</title>

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/community.css" />
  </head>

  <body class="community-page">
    <div class="community-wrap">
      <!-- header -->
      <header class="community-header">
        <a
          href="./home.html"
          class="community-back-button"
          aria-label="뒤로가기"
        >
          <img src="./images/icons/back.png" alt="" />
        </a>

        <h1>커뮤니티</h1>
      </header>

      <!-- main -->
      <main class="community-main">
        <!-- filter tabs -->
        <section class="community-tab-section">
          <div class="community-tabs" role="tablist" aria-label="커뮤니티 정렬">
            <button
              type="button"
              class="community-tab active"
              role="tab"
              aria-selected="true"
              data-filter="recent"
            >
              최근순
            </button>

            <button type="button" class="community-tab" role="tab" aria-selected="false" data-filter="popular">
              인기순
            </button>

            <button type="button" class="community-tab" role="tab" aria-selected="false" data-filter="liked">
              좋아요
            </button>
          </div>
        </section>

        <!-- post list -->
        <section class="community-list-section">
          <div class="community-list" id="communityList"></div>

          <p class="community-empty-message hidden" id="communityEmptyMessage">
            좋아요한 게시글이 없습니다.
          </p>

          <button
            type="button"
            class="community-more-button"
            id="communityMoreButton"
          >
            + 더보기
          </button>
        </section>
      </main>

      <!-- common tab bar -->
      <nav class="app-tabbar">
        <a href="./home.html" class="tabbar-item">
          <img src="./images/tab/home.png" alt="" />
          <span>홈</span>
        </a>

        <a href="./closet.html" class="tabbar-item">
          <img src="./images/tab/closet.png" alt="" />
          <span>옷장</span>
        </a>

        <a href="./codi.html" class="tabbar-item">
          <img src="./images/tab/codi.png" alt="" />
          <span>코디</span>
        </a>

        <a href="./community.html" class="tabbar-item active" aria-current="page">
          <img src="./images/tab/community-active.png" alt="" />
          <span>커뮤니티</span>
        </a>

        <a href="./my.html" class="tabbar-item">
          <img src="./images/tab/my.png" alt="" />
          <span>마이</span>
        </a>
      </nav>
    </div>

    <script src="./script/common.js"></script>
    <script src="./script/community.js"></script>
  </body>
</html>
