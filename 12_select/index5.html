<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문서객체선택 응용</title>
  </head>
  <body>
    <h1>회원명단</h1>
    <ul>
      <li>홍길동</li>
      <li>한만종</li>
      <li>김흥부</li>
      <li>이놀부</li>
      <li>정정화</li>
      <li>강인구</li>
    </ul>

    <script>
      let name = document.getElementsByTagName("ul li");
      name[0].style.background = "yellow";
      name[0].style.fontSize = "24px";
      name[1].style.background = "orange";
      name[1].style.color = "#fff";
      name[1].style.listStyle = "none";

      name[2].style.background = "yellow";
      name[2].style.fontSize = "24px";
      name[3].style.background = "orange";
      name[3].style.color = "#fff";
      name[3].style.listStyle = "none";

      name[4].style.background = "yellow";
      name[4].style.fontSize = "24px";
      name[5].style.background = "orange";
      name[5].style.color = "#fff";
      name[5].style.listStyle = "none";
    </script>
  </body>
</html>
