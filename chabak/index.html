<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>CHABAK Splash</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
        background: #e9e9e9;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .app {
        position: relative;
        width: 100vw;
        height: 100vh;
        max-width: 430px;
        background: #e9e9e9;
        overflow: hidden;
      }

      .splash {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }

      .logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        transform: translateY(38px);
        animation: fadeUp 1s ease-out;
      }

      .logo {
        width: 130px;
        height: auto;
        display: block;
      }

      .brand {
        margin-top: 8px;
        font-size: 25px;
        line-height: 1;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: #5c73bb;
      }

      .loading {
        position: absolute;
        bottom: 54px;
        display: flex;
        gap: 6px;
        opacity: 0.7;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #5c73bb;
        animation: bounce 1.2s infinite ease-in-out;
      }

      .dot:nth-child(2) {
        animation-delay: 0.15s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(52px);
        }
        to {
          opacity: 1;
          transform: translateY(38px);
        }
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0.8);
          opacity: 0.35;
        }
        40% {
          transform: scale(1.2);
          opacity: 1;
        }
      }

      svg {
        overflow: visible;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="splash">
        <div class="logo-wrap">
          <svg
            class="logo"
            viewBox="0 0 180 90"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="CHABAK logo"
          >
            <g
              fill="none"
              stroke="#5c73bb"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M8 67H152" stroke-width="3" />

              <path
                d="M18 58V45c0-6 4-10 10-10h40c4 0 8 2 11 5l8 8h10c8 0 14 6 14 14v2"
                stroke-width="4.5"
              />
              <path d="M30 35l8-10h30l11 10" stroke-width="4.5" />
              <path d="M88 42h8" stroke-width="4.5" />
              <circle cx="36" cy="66" r="7" fill="#e9e9e9" stroke-width="4.5" />
              <circle
                cx="101"
                cy="66"
                r="7"
                fill="#e9e9e9"
                stroke-width="4.5"
              />
              <path d="M111 66h10" stroke-width="4.5" />

              <path
                d="M124 65l18-34h28l18 34Z"
                fill="#5c73bb"
                stroke="#5c73bb"
                stroke-width="2.5"
              />
              <path
                d="M145 31l5 12"
                stroke="#e9e9e9"
                stroke-width="2.5"
                opacity="0.6"
              />
              <path
                d="M151 44l8 21"
                stroke="#e9e9e9"
                stroke-width="2.5"
                opacity="0.6"
              />

              <path
                d="M160 17l2.8 6 6.2 2.2-6.2 2.2-2.8 6-2.8-6-6.2-2.2 6.2-2.2Z"
                fill="#5c73bb"
                stroke="#5c73bb"
                stroke-width="1.5"
              />
            </g>
          </svg>
          <div class="brand">CHABAK</div>
        </div>

        <div class="loading" aria-hidden="true">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </section>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(function () {
          window.location.href = "./work1.html";
        }, 3000);
      });
    </script>
  </body>
</html>
