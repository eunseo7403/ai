          width: 58px;
          height: 38px;
          background: #6ea8d8;
          border: 4px solid #58739a;
          border-bottom-width: 6px;
          border-radius: 6px 6px 2px 2px;
          overflow: hidden;
          transform: skew(-8deg);
        }

        .screen-map::before {
          content: "";
          position: absolute;
          inset: 0;
          background:
            radial-gradient(circle at 42px 10px, #f0cb52 0 6px, transparent 6px),
            linear-gradient(135deg, transparent 0 10px, #dde7d1 10px 14px, transparent 14px 22px, #dde7d1 22px 26px, transparent 26px),

        .base {
          position: absolute;
          left: 0;
          bottom: 0;
          width: 76px;
          height: 16px;
          background: #7aa7d8;
          clip-path: polygon(10% 0, 90% 0, 100% 100%, 0 100%);
          border-radius: 2px;
        }

        .bottom {
          position: relative;
          z-index: 2;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 34px;
          margin-top: 10px;
        }

        .pagination {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 11px;
        }

        .dot {
          width: 10px;
          height: 10px;
          border-radius: 50%;
          background: #d6d6d8;
          transition: all 0.2s ease;
        }

        .dot.active {
          background: #6178bf;
          transform: scale(1.02);
        }

        .start-btn {
          width: 100%;
          height: 56px;
          border: 0;
          border-radius: 14px;
          background: #6178bf;
          color: #ffffff;
          font-size: 18px;
          font-weight: 700;
          letter-spacing: -0.2px;
          cursor: pointer;
          box-shadow: 0 10px 20px rgba(97, 120, 191, 0.16);
          transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }

        .start-btn:active {
          transform: translateY(1px);
          box-shadow: 0 6px 12px rgba(97, 120, 191, 0.14);
          background: #566fb8;
        }

        .toast {
          position: absolute;
          left: 50%;
          bottom: 108px;
          transform: translateX(-50%) translateY(12px);
          min-width: 210px;
          padding: 12px 16px;
          border-radius: 12px;
          background: rgba(49, 62, 102, 0.92);
          color: #fff;
          font-size: 14px;
          text-align: center;
          opacity: 0;
          pointer-events: none;
          transition: all 0.24s ease;
          z-index: 5;
        }

        .toast.show {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 390px) {

  <body>
    <div class="app">
      <main class="screen">
        <section class="headline">
          <h1 class="title">차박, 어디로 떠나야 할지 모르겠나요?</h1>
          <p class="subtitle">
            지도기반 위치 앱 및 키워드 검색으로 내가 원하는 장소를 한번에.
          </p>
        </section>

        <section class="visual-wrap" aria-hidden="true">
          <div class="bg-wave"></div>

          <div class="scene">
            <div class="map-paper"></div>

            <div class="bear">
              <div class="hat-brim"></div>
              <div class="hat-top"></div>
              <div class="hat-dot left"></div>
              <div class="hat-dot right"></div>

              <div class="ear left"></div>
              <div class="ear right"></div>
              <div class="head">
                <div class="face"></div>
                <div class="eye"></div>
                <div class="nose"></div>
                <div class="mouth"></div>
              </div>
              <div class="body-shape"></div>
              <div class="arm left"></div>
              <div class="arm right"></div>
              <div class="phone"></div>
              <div class="leg left"></div>
              <div class="leg right"></div>
              <div class="foot left"></div>
              <div class="foot right"></div>
            </div>

            <div class="laptop">
              <div class="screen-map"></div>
              <div class="base"></div>
            </div>
          </div>
        </section>

        <section class="bottom">
          <div class="pagination" aria-label="온보딩 페이지 표시">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>

          <button class="start-btn" id="startButton" type="button">
            시작하기
          </button>
        </section>
      </main>

      <div class="toast" id="toast">시작하기 버튼이 눌렸습니다.</div>
    </div>

    <script>
      const startButton = document.getElementById("startButton");
      const toast = document.getElementById("toast");
      let toastTimer;

      startButton.addEventListener("click", () => {
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          toast.classList.remove("show");
        }, 1600);
      });
    </script>
